name: update flake lock

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *" # (UTC+8 00:00)

concurrency:
  group: update-flake-lock
  cancel-in-progress: true

jobs:
  lockfile:
    runs-on: ubuntu-latest
    name: Update Lockfile
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Install Nix
        uses: nixbuild/nix-quick-install-action@v34
        with:
          nix_conf: |
            accept-flake-config = true

      - name: Generate PR title with date
        run: |
          DATE=$(date -u +'%Y-%m-%dT%H-%M-%SZ')
          echo "DATE=$DATE" >> $GITHUB_ENV
          echo "PR_TITLE=Update flake.lock - $DATE" >> $GITHUB_ENV

      - name: Run flake update script and generate report
        run: |
          OLD_DRV=$(nix eval .#nixosConfigurations.loneros.config.system.build.toplevel.drvPath --raw)
          SCRIPT_OUTPUT=$(python3 .github/script/flake_update.py)
          NEW_DRV=$(nix eval .#nixosConfigurations.loneros.config.system.build.toplevel.drvPath --raw)

          # 组装 PR Body
          echo "PR_REPORT<<EOF" >> $GITHUB_ENV
          echo "### Flake Inputs Update" >> $GITHUB_ENV
          echo "$SCRIPT_OUTPUT" >> $GITHUB_ENV

          if [ "$OLD_DRV" != "$NEW_DRV" ]; then
            echo -e "\n### 📦 System Package Changes" >> $GITHUB_ENV
            echo '```text' >> $GITHUB_ENV
            nix run nixpkgs#nvd -- diff "$OLD_DRV" "$NEW_DRV" >> $GITHUB_ENV
            echo '```' >> $GITHUB_ENV
          else
            echo -e "\n*(No system-level package changes detected)*" >> $GITHUB_ENV
          fi
          echo "EOF" >> $GITHUB_ENV

      - name: Check if flake.lock changed
        id: check_diff
        run: |
          if git diff --quiet flake.lock; then
            echo "::notice title=No updates::flake.lock unchanged, skipping PR"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      # 关闭旧 PR + 删分支
      - name: Close previous flake update PRs and delete branches
        if: steps.check_diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          gh pr list \
            --state open \
            --label auto_update_flake \
            --label github_actions \
            --json number,headRefName \
            --jq '.[] | select(.headRefName | startswith("update-flake-lock-")) | .number' \
          | while read pr; do
              echo "Closing auto-generated flake update PR #$pr"
              gh pr close "$pr" \
                --delete-branch \
                --comment "Superseded by a newer automated flake.lock update."
            done

      - name: Commit and push changes
        if: steps.check_diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b update-flake-lock-${{ env.DATE }}
          git add flake.lock
          git commit -m "${{ env.PR_TITLE }}" -m "${{ env.PR_REPORT }}"
          git push origin update-flake-lock-${{ env.DATE }}

      - name: Create pull request with gh CLI
        if: steps.check_diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          PR_TITLE: ${{ env.PR_TITLE }}
          PR_REPORT: ${{ env.PR_REPORT }}
          PR_BRANCH: update-flake-lock-${{ env.DATE }}
        run: |
          gh auth setup-git

          gh pr create \
            --title "$PR_TITLE" \
            --body "$PR_REPORT" \
            --base main \
            --head "$PR_BRANCH"

          gh pr edit "$PR_BRANCH" \
            --add-label auto_update_flake \
            --add-label github_actions
