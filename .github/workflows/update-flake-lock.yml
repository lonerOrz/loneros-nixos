name: update flake lock

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *" # (UTC+8 00:00)

concurrency:
  group: update-flake-lock
  cancel-in-progress: true

jobs:
  lockfile:
    runs-on: ubuntu-latest
    name: Update Lockfile

    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Install Nix
        uses: nixbuild/nix-quick-install-action@v34
        with:
          nix_conf: |
            accept-flake-config = true

      - name: Generate PR title with date
        run: |
          DATE=$(date -u +'%Y-%m-%dT%H-%M-%SZ')
          echo "DATE=$DATE" >> $GITHUB_ENV
          echo "PR_TITLE=Update flake.lock - $DATE" >> $GITHUB_ENV

      - name: Eval current system (before)
        env:
          NIXPKGS_ALLOW_INSECURE: "1"
        run: |
          OLD_DRV=$(nix eval .#nixosConfigurations.loneros.config.system.build.toplevel.drvPath --raw --impure)
          echo "OLD_DRV=$OLD_DRV" >> $GITHUB_ENV

      - name: Run flake update script
        run: |
          SCRIPT_OUTPUT=$(python3 .github/script/flake_update.py)
          echo "SCRIPT_OUTPUT<<EOF" >> $GITHUB_ENV
          echo "$SCRIPT_OUTPUT" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Eval current system (after)
        env:
          NIXPKGS_ALLOW_INSECURE: "1"
        run: |
          NEW_DRV=$(nix eval .#nixosConfigurations.loneros.config.system.build.toplevel.drvPath --raw --impure)
          echo "NEW_DRV=$NEW_DRV" >> $GITHUB_ENV

      - name: Build PR report
        run: |
          echo "### Flake Inputs Update" > /tmp/pr_report.txt
          echo "${SCRIPT_OUTPUT}" >> /tmp/pr_report.txt

      - name: Build PR comment
        run: |
          if [ "$OLD_DRV" != "$NEW_DRV" ]; then
            nix run nixpkgs#nvd -- diff "$OLD_DRV" "$NEW_DRV" > /tmp/nvd_raw.txt
          else
            echo "No system-level package changes detected." > /tmp/nvd_raw.txt
          fi

          SIZE=$(wc -c < /tmp/nvd_raw.txt)

          if [ "$SIZE" -gt 60000 ]; then
            echo "⚠️ nvd diff too large ($SIZE bytes), full output printed to CI log."
            echo "---- BEGIN NVD DIFF (FULL) ----"
            cat /tmp/nvd_raw.txt
            echo "---- END NVD DIFF ----"

            echo "⚠️ nvd diff too large, see GitHub Actions log for full output." > /tmp/pr_comment.txt
          else
            cp /tmp/nvd_raw.txt /tmp/pr_comment.txt
          fi

      - name: Check if flake.lock changed
        id: check_diff
        run: |
          if git diff --quiet flake.lock; then
            echo "::notice title=No updates::flake.lock unchanged, skipping PR"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Close previous flake update PRs and delete branches
        if: steps.check_diff.outputs.changed == 'true'
        run: |
          gh pr list \
            --state open \
            --label auto_update_flake \
            --label github_actions \
            --json number,headRefName \
            --jq '.[] | select(.headRefName | startswith("update-flake-lock-")) | .number' \
          | while read pr; do
              echo "Closing auto-generated flake update PR #$pr"
              gh pr close "$pr" \
                --delete-branch \
                --comment "Superseded by a newer automated flake.lock update."
            done

      - name: Commit and push changes
        if: steps.check_diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b update-flake-lock-${{ env.DATE }}
          git add flake.lock
          git commit -m "${{ env.PR_TITLE }}"
          git push origin update-flake-lock-${{ env.DATE }}

      - name: Create pull request with gh CLI
        if: steps.check_diff.outputs.changed == 'true'
        run: |
          gh auth setup-git

          gh pr create \
            --title "${{ env.PR_TITLE }}" \
            --body-file /tmp/pr_report.txt \
            --base main \
            --head "update-flake-lock-${{ env.DATE }}"

          PR_URL=$(gh pr view "update-flake-lock-${{ env.DATE }}" --json url -q .url)

          gh pr comment "$PR_URL" --body-file /tmp/pr_comment.txt

          gh pr edit "update-flake-lock-${{ env.DATE }}" \
            --add-label auto_update_flake \
            --add-label github_actions
