name: cachix-matrix

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  NIXPKGS_ALLOW_INSECURE: "1"

jobs:
  detect-missing:
    name: Detect Missing Packages
    runs-on: ubuntu-latest
    outputs:
      missing_packages: ${{ steps.check.outputs.missing }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            sandbox = true

      - name: Setup Nix environment
        run: |
          nix-channel --add https://nixos.org/channels/nixpkgs-unstable nixpkgs
          nix-channel --update

      - name: Check Cache and Output Matrix
        id: check
        run: |
          chmod +x .github/script/check-cache.py
          python .github/script/check-cache.py

  build-matrix:
    name: Build ${{ matrix.package.name }}
    needs: detect-missing
    if: ${{ needs.detect-missing.outputs.missing_packages != '[]' && needs.detect-missing.outputs.missing_packages != '' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.detect-missing.outputs.missing_packages) }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main

      - name: Add swap
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 20

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            sandbox = true

      - name: Setup Cachix
        uses: cachix/cachix-action@v17
        with:
          name: loneros
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          extraPullNames: nix-community

      - name: Build Path
        id: build
        run: |
          echo "Building ${{ matrix.package.name }}..."
          nix build --no-link --impure --expr 'let flake = builtins.getFlake (toString ./.); pkgs = flake.nixosConfigurations.loneros.config.environment.systemPackages; target = builtins.filter (p: p ? drvPath && p.drvPath == "${{ matrix.package.drv }}") pkgs; in if target == [] then throw "Package not found" else builtins.head target' --print-build-logs

      - name: Log success to summary
        if: success()
        run: |
          echo "✅ **Successfully built and pushed**: \`${{ matrix.package.name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Store path deriver: \`${{ matrix.package.drv }}\`" >> $GITHUB_STEP_SUMMARY

      - name: Log failure to summary
        if: failure()
        run: |
          echo "❌ **Failed to build**: \`${{ matrix.package.name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Please check the log of job: **Build ${{ matrix.package.name }}**" >> $GITHUB_STEP_SUMMARY
